{% set name = "libgit2" %}
{% set version = "1.9.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: d532172d7ab24d2a25944e2434212d63ee85f3650e97b5f7579e7f201a78ad64

build:
  number: 0
  run_exports:
    # SONAME is based on minor version
    - {{ pin_subpackage("libgit2", max_pin="x.x") }}

requirements:
  build:
    - cmake
    - ninja
    - pkg-config      # [not win]
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - msinttypes      # [win]
    - openssl         # [not win]
    - libiconv        # [osx]
    - pcre2  # [unix]
    - curl
    - libssh2
    - zlib
  run:
    - openssl         # [not win]
    - libiconv        # [osx]
    - curl
    - libssh2
    - zlib

# Header and library checks: recipe/run_test.sh (unix) and recipe/run_test.bat (windows).

about:
  home: https://libgit2.org
  dev_url: https://github.com/libgit2/libgit2
  doc_url: https://libgit2.org/docs/
  license: GPL-2.0-only WITH GCC-exception-2.0
  license_family: GPL
  license_file: COPYING
  summary: 'libgit2 is a portable, pure C implementation of the Git core methods provided as a re-entrant linkable library with a solid API, allowing you to write native speed custom Git applications in any language which supports C bindings.'

  # The remaining entries in this section are optional, but recommended
  description: |
    libgit2 is a portable, pure C implementation of the Git core methods
    provided as a re-entrant linkable library with a solid API, allowing
    you to write native speed custom Git applications in any language
    which supports C bindings.

extra:
  recipe-maintainers:
    - shadowwalkersb
    - xhochy
